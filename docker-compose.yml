services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/shopsphere
      JWT_SECRET: replace-in-prod
      CORS_ORIGIN: http://localhost:8080

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:5000
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "8080:3000"

volumes:
  mongo_data:
